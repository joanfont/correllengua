name: Build and push for production

env:
  IMAGE_NAME: ${{ github.repository }}
  IMAGE: ghcr.io/${{ github.repository_owner }}/${{ github.repository }}

on:
  push:
    branches:
      - main

jobs:
  build-and-test:
    name: "Build and test"
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build
        uses: docker/build-push-action@v6
        with:
          tags: ${{ env.IMAGE }}:test
          load: true
          build-args: |
            ENV=test
            UID=1000
            GID=1000

      - name: Run PHP CS Fixer (check only)
        run: |
          docker run --rm \
            ${{ env.IMAGE }}:test \
            ./vendor/bin/php-cs-fixer fix --dry-run --diff --verbose --using-cache=no

      - name: Run PHPUnit tests
        run: |
          docker run --rm \
            -e APP_ENV=test \
            ${{ env.IMAGE }}:test \
            php vendor/bin/phpunit --do-not-cache-result

  build-and-push-prod:
    name: "Build and push for production"
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write
      attestations: write
      id-token: write
    needs:
      - build-and-test
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to GitHub Container Registry
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build and push
        uses: docker/build-push-action@v6
        with:
          push: true
          tags: | 
            ${{ env.IMAGE }}:${{ github.sha }}
            ${{ env.IMAGE }}:latest
          build-args: |
            ENV=prod
            UID=1000
            GID=1000
